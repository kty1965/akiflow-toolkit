name: Release

on:
  push:
    branches:
      - main
      - beta
      - next

# Third-party actions pinned to full commit SHAs (SECURITY-AUDIT-REPORT S-7).

permissions:
  contents: read

jobs:
  build-binaries:
    name: Build ${{ matrix.target.name }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - { platform: bun-linux-x64, name: af-linux-x64 }
          - { platform: bun-linux-arm64, name: af-linux-arm64 }
          - { platform: bun-darwin-x64, name: af-darwin-x64 }
          - { platform: bun-darwin-arm64, name: af-darwin-arm64 }
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2.2.0
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Compile binary
        run: |
          bun build --compile --minify ./src/index.ts \
            --target=${{ matrix.target.platform }} \
            --outfile dist/${{ matrix.target.name }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: ${{ matrix.target.name }}
          path: dist/${{ matrix.target.name }}
          retention-days: 1

  release:
    name: Semantic Release
    needs: build-binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2.2.0
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6.3.0
        with:
          node-version: "22.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build (npm dist)
        run: bun run build

      - name: Download all binary artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          path: dist/
          merge-multiple: true

      - name: Verify artifacts
        run: ls -la dist/

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npx semantic-release
