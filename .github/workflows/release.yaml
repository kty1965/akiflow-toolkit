name: Release

on:
  push:
    branches:
      - main
      - beta
      - next

permissions:
  contents: read

jobs:
  build-binaries:
    name: Build ${{ matrix.target.name }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - { platform: bun-linux-x64, name: af-linux-x64 }
          - { platform: bun-linux-arm64, name: af-linux-arm64 }
          - { platform: bun-darwin-x64, name: af-darwin-x64 }
          - { platform: bun-darwin-arm64, name: af-darwin-arm64 }
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Compile binary
        run: |
          bun build --compile --minify ./src/index.ts \
            --target=${{ matrix.target.platform }} \
            --outfile dist/${{ matrix.target.name }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.target.name }}
          path: dist/${{ matrix.target.name }}
          retention-days: 1

  release:
    name: Semantic Release
    needs: build-binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build (npm dist)
        run: bun run build

      - name: Download all binary artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist/
          merge-multiple: true

      - name: Verify artifacts
        run: ls -la dist/

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npx semantic-release
