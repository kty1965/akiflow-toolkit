name: CI

on:
  pull_request:
    branches: [main]

jobs:
  check:
    name: Test + Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Test
        run: bun test

      - name: Build (dist)
        run: bun run build

      - name: Build check (linux-x64 binary)
        run: bun run build:linux-x64

  pre-commit:
    name: Pre-commit hooks (lint + commit-msg)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run pre-commit (all files — hygiene + biome)
        uses: pre-commit/action@v3.0.1

      - name: Validate PR commit messages
        run: |
          bunx --bun commitlint \
            --from=${{ github.event.pull_request.base.sha }} \
            --to=${{ github.event.pull_request.head.sha }}
