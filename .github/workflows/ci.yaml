name: CI

on:
  pull_request:
    branches: [main]

# Third-party actions are pinned to full commit SHAs (SECURITY-AUDIT-REPORT
# S-7) to prevent supply-chain attacks via mutable tag re-pointing. Dependabot
# will bump these SHAs and keep the trailing version comment current.

jobs:
  check:
    name: Test + Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2.2.0
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Test
        run: bun test

      - name: Build (dist)
        run: bun run build

      - name: Build check (linux-x64 binary)
        run: bun run build:linux-x64

  pre-commit:
    name: Pre-commit hooks (lint + commit-msg)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2.2.0
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run pre-commit (all files — hygiene + biome)
        uses: pre-commit/action@2c7b3805fd2a0fd8c1884dcaebf91fc102a13ecd  # v3.0.1

      - name: Validate PR commit messages
        run: |
          bunx --bun commitlint \
            --from=${{ github.event.pull_request.base.sha }} \
            --to=${{ github.event.pull_request.head.sha }}
