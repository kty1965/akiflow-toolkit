name: Bug Report
description: Report a bug in akiflow-toolkit
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting! Please fill in the details below.
        **IMPORTANT: Never include tokens, passwords, or auth.json content.**
  - type: input
    id: version
    attributes:
      label: Version
      description: "Output of `af --version`"
      placeholder: "0.1.0"
    validations:
      required: true
  - type: dropdown
    id: mode
    attributes:
      label: Mode
      options:
        - CLI (af ls, af add, etc.)
        - MCP Server (af --mcp)
        - Authentication (af auth)
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Clear description of the bug
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce
      placeholder: |
        1. Run `af auth`
        2. Run `af ls`
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "macOS 15.x arm64 / Ubuntu 24.04 x64"
    validations:
      required: true
  - type: input
    id: bun-version
    attributes:
      label: Bun version
      placeholder: "1.x.x"
